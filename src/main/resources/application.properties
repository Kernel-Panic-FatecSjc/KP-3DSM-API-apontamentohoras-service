spring.application.name=apontamentohoras_service
server.port=8084

spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

logging.level.com.kernelpanic.apontamentohoras_service.config=DEBUG

spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}

spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0

spring.sql.init.mode=always
spring.sql.init.continue-on-error=false
spring.jpa.defer-datasource-initialization=true

integracoes.usuario.url=${USUARIO_SERVICE_URL:http://localhost:8083}
integracoes.projeto.url=${PROJETO_SERVICE_URL:http://localhost:8082}

jwt.secret=${JWT_SECRET:sua_chave_secreta_muito_segura_com_mais_de_256_bits_para_hs256}