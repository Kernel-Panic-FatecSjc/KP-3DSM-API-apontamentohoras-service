spring.application.name=apontamentohoras_service

server.port=8084

# Configurações vindas do Docker
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Logs SQL
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Logs de diagnóstico JWT/Security (remover após validar)
logging.level.com.kernelpanic.apontamentohoras_service.config=DEBUG

# Hibernate
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}

# Flyway
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0

# Integrações (usadas apenas na leitura da auditoria para resolver nomes)
integracoes.usuario.url=${USUARIO_SERVICE_URL:http://localhost:8083}
integracoes.projeto.url=${PROJETO_SERVICE_URL:http://localhost:8082}

# JWT (mesmo secret do auth-service — deve ser igual em todos os serviços)
jwt.secret=${JWT_SECRET:sua_chave_secreta_muito_segura_com_mais_de_256_bits_para_hs256}